name: PDFEditor
options:
  bundleIdPrefix: com.whitney
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES

targets:
  PDFEditor:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PDFEditor
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whitney.PDFEditor
        INFOPLIST_FILE: PDFEditor/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: ""
    dependencies:
      - sdk: PDFKit.framework
    info:
      path: PDFEditor/Resources/Info.plist
      properties:
        CFBundleDisplayName: PDF Editor
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: "Used to import PDFs from your photo library"

  PDFEditorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PDFEditorTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whitney.PDFEditorTests
    dependencies:
      - target: PDFEditor

  PDFEditorUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PDFEditorUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whitney.PDFEditorUITests
        TEST_TARGET_NAME: PDFEditor
    dependencies:
      - target: PDFEditor

schemes:
  PDFEditor:
    build:
      targets:
        PDFEditor: all
        PDFEditorTests: [test]
        PDFEditorUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PDFEditorTests
        - PDFEditorUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
