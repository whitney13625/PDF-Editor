name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: |
          xcodebuild build \
            -project PDFEditor/PDFEditor.xcodeproj \
            -scheme PDFEditor \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Test
        run: |
          xcodebuild test \
            -project PDFEditor/PDFEditor.xcodeproj \
            -scheme PDFEditor \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            CODE_SIGNING_ALLOWED=NO | xcpretty
